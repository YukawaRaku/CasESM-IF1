seed: 42
device: cuda
model:
  pretrained_name: esm_if1_gvp4_t16_142M_UR50
  freeze_base: true
  lora:
    enabled: true
    rank: 8
    alpha: 16
    dropout: 0.05
    target_modules: []
data:
  max_length: 512
  crop_mode: random
  batch_size: 1
  num_workers: 4
  pin_memory: true
training:
  epochs: 8
  lr: 3.0e-4
  weight_decay: 0.01
  grad_accum_steps: 8
  max_grad_norm: 1.0
  mixed_precision: true
  log_every: 10
  eval_every: 1
  save_every: 1
  label_smoothing: 0.0

